[pytest]
# pytest 配置文件

# 测试发现路径
testpaths = tests

# 标记定义
markers =
    slow: 耗时较长的测试（稳定性/压力测试）
    unit: 单元测试
    integration: 集成测试
    security: 安全测试

# 输出选项
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

# 忽略目录
norecursedirs = .git __pycache__ .venv venv node_modules

# 超时配置需要 pytest-timeout 插件
# pip install pytest-timeout
# timeout = 300

# 覆盖率配置（可选）
# 使用时：pytest --cov=backend --cov-report=html
