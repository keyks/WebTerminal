<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 92 92" width="92" height="92">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181830" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#0c0c1e" stop-opacity="0.94"/>
    </linearGradient>

    <style>
      .term-btn { animation: termBtnPulse var(--tb-dur, 3s) ease-in-out infinite; }
      .cursor { animation: cursorPulse 1.05s ease-in-out infinite; }

      @keyframes termBtnPulse {
        0%,100% { opacity: 0.65; }
        50%     { opacity: 0.35; }
      }
      @keyframes cursorPulse {
        0%,100% { opacity: 0.88; }
        50%     { opacity: 0.04; }
      }
    </style>
  </defs>

  <g transform="translate(46, 46)">
    <!-- 主体 -->
    <rect x="-44" y="-44" width="88" height="88" rx="14" fill="url(#termBg)" stroke="#5566aa" stroke-width="1.5" stroke-opacity="0.35"/>
    <rect x="-42" y="-42" width="84" height="84" rx="12" fill="none" stroke="#445588" stroke-width="0.4" stroke-opacity="0.2"/>
    <rect x="-36" y="-36" width="72" height="72" rx="8"  fill="none" stroke="#334466" stroke-width="0.3" stroke-opacity="0.12"/>

    <!-- 三色控制按钮 -->
    <circle cx="-30" cy="-30" r="4" fill="#ff5f57" class="term-btn" style="--tb-dur:3.1s"/>
    <circle cx="-19" cy="-30" r="4" fill="#ffbd2e" class="term-btn" style="--tb-dur:3.7s"/>
    <circle cx="-8"  cy="-30" r="4" fill="#28ca41" class="term-btn" style="--tb-dur:4.3s"/>

    <!-- 代码 -->
    <text x="-18" y="12" font-family="'Courier New',monospace" font-size="40" font-weight="bold" fill="#ddeeff" opacity="0.82">_</text>
    <text x="10"  y="12" font-family="'Courier New',monospace" font-size="34" font-weight="bold" fill="#ffffff" class="cursor">&lt;</text>
  </g>
</svg>